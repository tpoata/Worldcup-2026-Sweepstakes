<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 · Sweepstakes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0A1628;
    --card: #1A2E50;
    --card-light: #243D6A;
    --gold: #C8A84B;
    --gold-dim: rgba(200,168,75,0.15);
    --text: #E8EDF5;
    --text-dim: #8A9BBC;
    --live: #2ECC71;
    --elim: #E63946;
    --border: rgba(255,255,255,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(180deg, #06101e 0%, var(--navy) 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .trophy-icon { font-size: 22px; filter: drop-shadow(0 0 8px var(--gold)); }

  .header-title {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
  }

  .header-sub { font-size: 11px; color: var(--text-dim); letter-spacing: 0.5px; }

  nav { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
  nav::-webkit-scrollbar { display: none; }

  .tab {
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 10px 18px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  main { max-width: 960px; margin: 0 auto; padding: 20px 16px 60px; }

  .panel { display: none; }
  .panel.active { display: block; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .card-header {
    padding: 10px 14px;
    background: rgba(0,0,0,0.2);
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .match-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
    transition: background 0.15s;
  }

  .match-row:last-child { border-bottom: none; }
  .match-row:hover { background: rgba(255,255,255,0.03); }
  .match-row.live { background: rgba(46,204,113,0.05); }

  .live-badge {
    display: inline-block;
    background: var(--live);
    color: #000;
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 5px;
    border-radius: 3px;
    animation: pulse 1.5s ease-in-out infinite;
    margin-left: 6px;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  .team-block { display: flex; align-items: center; gap: 8px; }
  .team-block.away { flex-direction: row-reverse; text-align: right; }
  .team-flag { font-size: 20px; line-height: 1; flex-shrink: 0; }
  .team-info { min-width: 0; }

  .team-name {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .team-owner { font-size: 10px; color: var(--text-dim); font-weight: 500; margin-top: 1px; }

  .owner-tag {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
    flex-shrink: 0;
  }

  .score-block { text-align: center; min-width: 70px; }

  .score {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text);
  }

  .score.upcoming {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 400;
    letter-spacing: 0.5px;
  }

  .match-meta { font-size: 10px; color: var(--text-dim); margin-top: 2px; letter-spacing: 0.3px; }

  .section-label {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 18px 0 8px;
  }

  /* Groups */
  .groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

  .group-table { width: 100%; border-collapse: collapse; }

  .group-table th {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 6px 8px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  .group-table th:first-child { text-align: left; }
  .group-table td { padding: 8px 8px; text-align: center; font-size: 13px; border-bottom: 1px solid var(--border); }
  .group-table tr:last-child td { border-bottom: none; }
  .group-table td:first-child { text-align: left; }

  .group-team-cell { display: flex; align-items: center; gap: 7px; }
  .group-flag { font-size: 16px; }

  .group-team-name {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 500;
  }

  .group-owner-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .pts-cell { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 14px; color: var(--gold); }

  tr.eliminated .group-team-name { text-decoration: line-through; color: var(--elim); }

  .q-pill {
    display: inline-block;
    font-size: 9px;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 0.5px;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 4px;
    vertical-align: middle;
  }

  .q-pill.adv { background: rgba(46,204,113,0.2); color: var(--live); }
  .q-pill.elim { background: rgba(230,57,70,0.2); color: var(--elim); }

  /* Knockout */
  .bracket-stage { margin-bottom: 28px; }

  .bracket-stage-title {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    padding: 0 0 10px;
    border-bottom: 1px solid var(--gold-dim);
    margin-bottom: 12px;
  }

  .bracket-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }

  .bracket-match {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .bracket-match-header {
    font-size: 10px;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 6px 10px;
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid var(--border);
  }

  .bracket-team {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .bracket-team:last-child { border-bottom: none; }
  .bracket-team.winner { background: rgba(200,168,75,0.08); }
  .bracket-team.loser { opacity: 0.45; }

  .bracket-team-left { display: flex; align-items: center; gap: 8px; }
  .bracket-team-score { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; }
  .bracket-team-score.tbd { font-size: 12px; color: var(--text-dim); font-weight: 400; }

  /* Sweepstakes */
  .sweep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }

  .sweep-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .sweep-card-header {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  .sweep-colour { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .sweep-name {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .sweep-score-badge {
    margin-left: auto;
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    font-weight: 700;
    background: var(--gold-dim);
    color: var(--gold);
    padding: 2px 7px;
    border-radius: 4px;
  }

  .sweep-teams { padding: 8px 0; }

  .sweep-team-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-left: 3px solid transparent;
    transition: background 0.15s;
  }

  .sweep-team-row:hover { background: rgba(255,255,255,0.03); }
  .sweep-team-row.eliminated { opacity: 0.4; }
  .sweep-team-row.eliminated .sweep-team-name { text-decoration: line-through; }

  .sweep-team-flag { font-size: 18px; }

  .sweep-team-name {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 500;
    flex: 1;
  }

  .sweep-team-status { font-size: 10px; font-family: 'Oswald', sans-serif; letter-spacing: 0.5px; color: var(--text-dim); }
  .sweep-team-status.adv { color: var(--live); }
  .sweep-team-status.champ { color: var(--gold); }
  .sweep-team-status.elim { color: var(--elim); }

  /* Dashboard hero */
  .dash-hero {
    background: linear-gradient(135deg, #0d2045 0%, #1a3a6b 100%);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .dash-hero::before {
    content: '⚽';
    position: absolute;
    right: -10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 90px;
    opacity: 0.04;
  }

  .dash-hero-label {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }

  .dash-hero-teams {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 10px;
  }

  .dash-hero-team { text-align: center; flex: 1; max-width: 140px; }
  .dash-hero-flag { font-size: 36px; margin-bottom: 6px; }

  .dash-hero-name {
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .dash-hero-owner { font-size: 11px; color: var(--text-dim); margin-top: 3px; }

  .dash-hero-vs {
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--text-dim);
    min-width: 80px;
    text-align: center;
  }

  .dash-hero-score {
    font-family: 'Oswald', sans-serif;
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 4px;
    text-align: center;
    color: var(--text);
  }

  .dash-hero-meta { text-align: center; font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  .dash-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* Schedule filter */
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }

  .filter-btn {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--gold); color: var(--text); }
  .filter-btn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 600; }

  .schedule-date-header {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    padding: 10px 14px 4px;
    background: rgba(200,168,75,0.05);
    border-bottom: 1px solid var(--border);
  }

  @media (max-width: 600px) {
    .dash-two-col { grid-template-columns: 1fr; }
    .dash-hero-name { font-size: 13px; }
    .sweep-grid { grid-template-columns: 1fr; }
    .groups-grid { grid-template-columns: 1fr; }
    .bracket-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="trophy-icon">🏆</span>
    <div>
      <div class="header-title">FIFA World Cup 2026</div>
      <div class="header-sub">Sweepstakes Dashboard · USA · Canada · Mexico</div>
    </div>
  </div>
  <nav>
    <button class="tab active" onclick="showPanel('dashboard', this)">Dashboard</button>
    <button class="tab" onclick="showPanel('schedule', this)">Schedule</button>
    <button class="tab" onclick="showPanel('groups', this)">Groups</button>
    <button class="tab" onclick="showPanel('knockout', this)">Knockout</button>
    <button class="tab" onclick="showPanel('sweepstakes', this)">Sweepstakes</button>
  </nav>
</header>

<div id="api-banner" style="display:none;padding:8px 20px;font-size:11px;font-family:'Oswald',sans-serif;letter-spacing:1px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.07);transition:all 0.3s"></div>

<main>
  <div id="panel-dashboard" class="panel active">
    <div id="dash-hero-container"></div>
    <div class="dash-two-col">
      <div>
        <div class="section-label">Recent Results</div>
        <div class="card" id="recent-matches"></div>
      </div>
      <div>
        <div class="section-label">Upcoming Fixtures</div>
        <div class="card" id="upcoming-matches"></div>
      </div>
    </div>
  </div>

  <div id="panel-schedule" class="panel">
    <div class="section-label">Full Schedule</div>
    <div class="filter-bar" id="schedule-filters"></div>
    <div id="schedule-list"></div>
  </div>

  <div id="panel-groups" class="panel">
    <div class="section-label">Group Stage Standings</div>
    <div class="groups-grid" id="groups-grid"></div>
  </div>

  <div id="panel-knockout" class="panel">
    <div id="knockout-container"></div>
  </div>

  <div id="panel-sweepstakes" class="panel">
    <div class="section-label">Sweepstakes</div>
    <div class="sweep-grid" id="sweep-grid"></div>
  </div>
</main>

function toLocalCode(apiCode) {
  return CODE_MAP[apiCode] || apiCode;
}

function formatMatchDate(utcString) {
  if (!utcString) return '';
  var d = new Date(utcString);
  var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var day = days[d.getDay()];
  var date = d.getDate();
  var month = months[d.getMonth()];
  // Format time in AEST (UTC+10)
  var aest = new Date(d.getTime() + 10 * 60 * 60 * 1000);
  var h = aest.getUTCHours();
  var m = aest.getUTCMinutes();
  var ampm = h >= 12 ? 'AEST' : 'AEST';
  var hh = h.toString().padStart(2,'0');
  var mm = m.toString().padStart(2,'0');
  return day + ' ' + date + ' ' + month + ' · ' + hh + ':' + mm + ' AEST';
}

function apiMatchStatus(m) {
  var s = m.status;
  if (s === 'FINISHED') return 'completed';
  if (s === 'IN_PLAY' || s === 'PAUSED' || s === 'HALFTIME') return 'live';
  return 'upcoming';
}

function mapApiMatches(apiMatches) {
  return apiMatches.map(function(m) {
    var status = apiMatchStatus(m);
    var home = toLocalCode(m.homeTeam && m.homeTeam.tla ? m.homeTeam.tla : 'TBD');
    var away = toLocalCode(m.awayTeam && m.awayTeam.tla ? m.awayTeam.tla : 'TBD');
    var homeScore = m.score && m.score.fullTime ? m.score.fullTime.home : null;
    var awayScore = m.score && m.score.fullTime ? m.score.fullTime.away : null;
    if (status === 'live') {
      homeScore = m.score && m.score.halfTime ? m.score.halfTime.home : null;
      // use in-play score if available
      if (m.score && m.score.fullTime && m.score.fullTime.home !== null) {
        homeScore = m.score.fullTime.home;
        awayScore = m.score.fullTime.away;
      }
    }
    var stage = m.stage || m.group || 'Group Stage';
    // Clean up stage label
    stage = stage.replace(/_/g, ' ').replace(/GROUP_/,'Group ');
    return {
      home: home,
      away: away,
      homeScore: homeScore,
      awayScore: awayScore,
      status: status,
      liveMinute: m.minute ? (m.injuryTime ? (m.minute + '+' + m.injuryTime) : String(m.minute)) : "0",
      stage: stage,
      date: formatMatchDate(m.utcDate),
    };
  });
}

function mapApiStandings(apiStandings) {
  var groups = {};
  apiStandings.forEach(function(standing) {
    var gName = standing.group || 'GROUP_A';
    var letter = gName.replace('GROUP_','');
    var key = letter;
    groups[key] = {
      name: 'Group ' + letter,
      teams: standing.table.map(function(row) {
        var code = toLocalCode(row.team.tla);
        return {
          code: code,
          mp: row.playedGames,
          w: row.won,
          d: row.draw,
          l: row.lost,
          gf: row.goalsFor,
          ga: row.goalsAgainst,
          pts: row.points,
        };
      })
    };
  });
  return groups;
}

function mapApiKnockout(apiMatches) {
  var stageOrder = ['LAST_32','LAST_16','QUARTER_FINALS','SEMI_FINALS','FINAL'];
  var stageLabels = {
    'LAST_32': 'Round of 32',
    'LAST_16': 'Round of 16',
    'QUARTER_FINALS': 'Quarter-Finals',
    'SEMI_FINALS': 'Semi-Finals',
    'FINAL': '🏆 Final',
  };
  var byStage = {};
  apiMatches.forEach(function(m) {
    var s = m.stage;
    if (!byStage[s]) byStage[s] = [];
    byStage[s].push(m);
  });
  return stageOrder.filter(function(s){ return byStage[s]; }).map(function(s) {
    return {
      stage: stageLabels[s] || s,
      matches: byStage[s].map(function(m, i) {
        var home = toLocalCode(m.homeTeam && m.homeTeam.tla ? m.homeTeam.tla : 'TBD');
        var away = toLocalCode(m.awayTeam && m.awayTeam.tla ? m.awayTeam.tla : 'TBD');
        var status = apiMatchStatus(m);
        var homeScore = m.score && m.score.fullTime ? m.score.fullTime.home : null;
        var awayScore = m.score && m.score.fullTime ? m.score.fullTime.away : null;
        var winner = null;
        if (m.score && m.score.winner) {
          winner = m.score.winner === 'HOME_TEAM' ? home : (m.score.winner === 'AWAY_TEAM' ? away : null);
        }
        return {
          label: (stageLabels[s] || s) + ' · Match ' + (i+1),
          home: home,
          away: away,
          homeScore: homeScore,
          awayScore: awayScore,
          winner: winner,
          date: formatMatchDate(m.utcDate),
        };
      })
    };
  });
}

var teamOwner = {};
FRIENDS.forEach(function(f) {
  f.teams.forEach(function(t) { teamOwner[t] = f; });
});

function ownerTag(code) {
  var f = teamOwner[code];
  if (!f) return '';
  return '<div class="team-owner"><span class="owner-tag" style="background:'+f.colour+'"></span>'+f.name+'</div>';
}

function teamBlock(code, side) {
  var t = TEAMS[code];
  if (!t) return '<div class="team-block '+side+'"><div class="team-info"><div class="team-name">'+code+'</div></div></div>';
  var f = teamOwner[code];
  var borderStyle = f ? (side==='home' ? 'border-left:3px solid '+f.colour+';padding-left:6px;' : 'border-right:3px solid '+f.colour+';padding-right:6px;') : '';
  return '<div class="team-block '+side+'" style="'+borderStyle+'">'
    + '<div class="team-flag">'+t.flag+'</div>'
    + '<div class="team-info">'
    + '<div class="team-name">'+t.name+'</div>'
    + ownerTag(code)
    + '</div></div>';
}

function renderMatches(matches, container) {
  if (!matches.length) {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:12px;">No matches</div>';
    return;
  }
  container.innerHTML = matches.map(function(m) {
    var live = m.status === 'live';
    var done = m.status === 'completed';
    var scoreHtml = '';
    if (live) {
      scoreHtml = '<div class="score-block"><div class="score">'+m.homeScore+' – '+m.awayScore+'</div>'
        + '<div class="match-meta">'+m.liveMinute+"' <span class='live-badge'>LIVE</span></div>"
        + '<div class="match-meta">'+m.stage+'</div></div>';
    } else if (done) {
      scoreHtml = '<div class="score-block"><div class="score">'+m.homeScore+' – '+m.awayScore+'</div>'
        + '<div class="match-meta">FT · '+m.stage+'</div>'
        + '<div class="match-meta">'+m.date+'</div></div>';
    } else {
      scoreHtml = '<div class="score-block"><div class="score upcoming">vs</div>'
        + '<div class="match-meta">'+m.stage+'</div>'
        + '<div class="match-meta">'+m.date+'</div></div>';
    }
    return '<div class="match-row'+(live?' live':'')+'">'+teamBlock(m.home,'home')+scoreHtml+teamBlock(m.away,'away')+'</div>';
  }).join('');
}

function buildDashboard() {
  var hero = MATCHES.find(function(m){ return m.status==='live'; })
           || MATCHES.find(function(m){ return m.status==='upcoming'; })
           || MATCHES[MATCHES.length-1];

  if (hero) {
    var ht = TEAMS[hero.home] || { flag:'🏳️', name:hero.home };
    var at = TEAMS[hero.away] || { flag:'🏳️', name:hero.away };
    var hOwner = teamOwner[hero.home];
    var aOwner = teamOwner[hero.away];
    var label = hero.status==='live' ? "⚡ Live Now — "+hero.stage
      : hero.status==='upcoming' ? "Next Match — "+hero.stage
      : "Latest Result — "+hero.stage;
    var scoreDisplay = hero.status==='upcoming'
      ? '<div class="dash-hero-vs">vs</div>'
      : '<div style="text-align:center"><div class="dash-hero-score">'+hero.homeScore+' – '+hero.awayScore+'</div>'
        + (hero.status==='live' ? '<div style="font-size:12px;color:var(--live);margin-top:4px">'+hero.liveMinute+"' <span class='live-badge'>LIVE</span></div>"
          : '<div style="font-size:11px;color:var(--text-dim);margin-top:4px">Full Time</div>')
        + '</div>';

    document.getElementById('dash-hero-container').innerHTML =
      '<div class="dash-hero">'
      + '<div class="dash-hero-label">'+label+'</div>'
      + '<div class="dash-hero-teams">'
      + '<div class="dash-hero-team">'
      + '<div class="dash-hero-flag">'+ht.flag+'</div>'
      + '<div class="dash-hero-name" style="'+(hOwner?'color:'+hOwner.colour:'')+'">'+ht.name+'</div>'
      + (hOwner ? '<div class="dash-hero-owner">'+hOwner.name+'</div>' : '')
      + '</div>'
      + scoreDisplay
      + '<div class="dash-hero-team">'
      + '<div class="dash-hero-flag">'+at.flag+'</div>'
      + '<div class="dash-hero-name" style="'+(aOwner?'color:'+aOwner.colour:'')+'">'+at.name+'</div>'
      + (aOwner ? '<div class="dash-hero-owner">'+aOwner.name+'</div>' : '')
      + '</div>'
      + '</div>'
      + '<div class="dash-hero-meta">'+hero.date+'</div>'
      + '</div>';
  }

  var recent = MATCHES.filter(function(m){ return m.status==='completed'; }).slice(-5).reverse();
  var live = MATCHES.filter(function(m){ return m.status==='live'; });
  var upcoming = MATCHES.filter(function(m){ return m.status==='upcoming'; }).slice(0,6);
  renderMatches(live.concat(recent), document.getElementById('recent-matches'));
  renderMatches(upcoming, document.getElementById('upcoming-matches'));
}

var scheduleFilter = 'all';

function buildSchedule() {
  var filterBar = document.getElementById('schedule-filters');
  var friendFilters = [{ name:'All', key:'all' }].concat(FRIENDS.map(function(f){ return { name:f.name, key:f.name }; }));
  filterBar.innerHTML = friendFilters.map(function(f) {
    return '<button class="filter-btn'+(scheduleFilter===f.key?' active':'')+'" onclick="setScheduleFilter(\''+f.key+'\')">'
      + (f.key!=='all' ? '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:'+(FRIENDS.find(function(fr){return fr.name===f.key;})||{colour:'transparent'}).colour+';margin-right:5px;vertical-align:middle"></span>' : '')
      + f.name + '</button>';
  }).join('');

  var list = document.getElementById('schedule-list');
  var filtered = MATCHES;
  if (scheduleFilter !== 'all') {
    var friend = FRIENDS.find(function(f){ return f.name===scheduleFilter; });
    if (friend) {
      filtered = MATCHES.filter(function(m){ return friend.teams.indexOf(m.home)>-1 || friend.teams.indexOf(m.away)>-1; });
    }
  }

  // Group by date label
  var byDate = {};
  var dateOrder = [];
  filtered.forEach(function(m) {
    var d = m.date.split(' · ')[0];
    if (!byDate[d]) { byDate[d] = []; dateOrder.push(d); }
    byDate[d].push(m);
  });

  list.innerHTML = dateOrder.map(function(d) {
    var card = '<div class="card" style="margin-bottom:12px">'
      + '<div class="schedule-date-header">'+d+'</div>'
      + byDate[d].map(function(m) {
          var live = m.status==='live', done = m.status==='completed';
          var scoreHtml = '';
          if (live) {
            scoreHtml = '<div class="score-block"><div class="score">'+m.homeScore+' – '+m.awayScore+'</div>'
              + '<div class="match-meta">'+m.liveMinute+"' <span class='live-badge'>LIVE</span></div>"
              + '<div class="match-meta">'+m.date.split(' · ')[1]+'</div></div>';
          } else if (done) {
            scoreHtml = '<div class="score-block"><div class="score">'+m.homeScore+' – '+m.awayScore+'</div>'
              + '<div class="match-meta">FT · '+m.stage+'</div>'
              + '<div class="match-meta">'+m.date.split(' · ')[1]+'</div></div>';
          } else {
            scoreHtml = '<div class="score-block"><div class="score upcoming">vs</div>'
              + '<div class="match-meta">'+m.stage+'</div>'
              + '<div class="match-meta">'+m.date.split(' · ')[1]+'</div></div>';
          }
          return '<div class="match-row'+(live?' live':'')+'">'+teamBlock(m.home,'home')+scoreHtml+teamBlock(m.away,'away')+'</div>';
        }).join('')
      + '</div>';
    return card;
  }).join('');

  if (!filtered.length) {
    list.innerHTML = '<div style="padding:30px;text-align:center;color:var(--text-dim)">No matches found</div>';
  }
}

function setScheduleFilter(key) {
  scheduleFilter = key;
  buildSchedule();

function buildGroups() {
  var grid = document.getElementById('groups-grid');
  grid.innerHTML = Object.keys(GROUPS).map(function(gk) {
    var g = GROUPS[gk];
    var sorted = g.teams.slice().sort(function(a,b){
      if (b.pts !== a.pts) return b.pts - a.pts;
      return (b.gf-b.ga) - (a.gf-a.ga);
    });
    var rows = sorted.map(function(row, i) {
      var t = TEAMS[row.code] || { flag:'', name:row.code };
      var f = teamOwner[row.code];
      var gd = row.gf - row.ga;
      var elim = t.status === 'eliminated';
      var advanced = t.status === 'active' && row.mp === 3;
      var rowClass = elim ? 'eliminated' : '';
      var pill = '';
      if (row.mp === 3) {
        if (elim) pill = '<span class="q-pill elim">OUT</span>';
        else if (advanced) pill = '<span class="q-pill adv">ADV</span>';
      }
      return '<tr class="'+rowClass+'">'
        + '<td><div class="group-team-cell">'
        + (f ? '<div class="group-owner-dot" style="background:'+f.colour+'"></div>' : '<div class="group-owner-dot" style="background:transparent"></div>')
        + '<span class="group-flag">'+t.flag+'</span>'
        + '<div style="display:flex;flex-direction:column;line-height:1.2">'
        + '<span class="group-team-name">'+t.name+(pill ? ' '+pill : '')+'</span>'
        + (f ? '<span style="font-size:10px;font-weight:400;color:'+f.colour+';opacity:0.85">'+f.name+'</span>' : '')
        + '</div>'
        + '</div></td>'
        + '<td>'+row.mp+'</td>'
        + '<td>'+row.w+'</td>'
        + '<td>'+row.d+'</td>'
        + '<td>'+row.l+'</td>'
        + '<td>'+(gd>0?'+':'')+gd+'</td>'
        + '<td class="pts-cell">'+row.pts+'</td>'
        + '</tr>';
    }).join('');

    return '<div class="card">'
      + '<div class="card-header"><span>'+g.name.replace('Group Group','Group')+'</span></div>'
      + '<table class="group-table">'
      + '<thead><tr><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead>'
      + '<tbody>'+rows+'</tbody>'
      + '</table></div>';
  }).join('');
}

function buildKnockout() {
  var container = document.getElementById('knockout-container');
  container.innerHTML = KNOCKOUT.map(function(stage) {
    var matches = stage.matches.map(function(m) {
      var ht = TEAMS[m.home];
      var at = TEAMS[m.away];
      var hf = ht ? teamOwner[m.home] : null;
      var af = at ? teamOwner[m.away] : null;
      var homeWon = m.winner && m.winner === m.home;
      var awayWon = m.winner && m.winner === m.away;
      var hasScore = m.homeScore !== null;

      function bTeam(code, team, friend, won, lost, score) {
        var cls = won ? 'winner' : (lost ? 'loser' : '');
        var borderStyle = friend ? 'border-left:3px solid '+friend.colour : '';
        return '<div class="bracket-team '+cls+'" style="'+borderStyle+'">'
          + '<div class="bracket-team-left">'
          + (team ? '<span style="font-size:18px;margin-right:6px">'+team.flag+'</span>' : '<span style="font-size:14px;color:var(--text-dim);margin-right:6px">🏳️</span>')
          + '<div>'
          + '<div class="group-team-name" style="'+(friend?'color:'+friend.colour:'color:var(--text-dim)')+'">'+( team ? team.name : code)+'</div>'
          + (friend ? '<div style="font-size:10px;color:var(--text-dim)">'+friend.name+'</div>' : '')
          + '</div>'
          + '</div>'
          + (hasScore ? '<div class="bracket-team-score">'+score+'</div>' : '<div class="bracket-team-score tbd">—</div>')
          + '</div>';
      }

      return '<div class="bracket-match">'
        + '<div class="bracket-match-header">'+m.label+' · '+m.date+'</div>'
        + bTeam(m.home, ht, hf, homeWon, awayWon, m.homeScore)
        + bTeam(m.away, at, af, awayWon, homeWon, m.awayScore)
        + '</div>';
    }).join('');

    return '<div class="bracket-stage">'
      + '<div class="bracket-stage-title">'+stage.stage+'</div>'
      + '<div class="bracket-grid">'+matches+'</div>'
      + '</div>';
  }).join('');
}

function buildSweepstakes() {
  var grid = document.getElementById('sweep-grid');
  grid.innerHTML = FRIENDS.map(function(f) {
    var alive = f.teams.filter(function(t){ return TEAMS[t] && TEAMS[t].status !== 'eliminated'; }).length;
    var teams = f.teams.map(function(code) {
      var t = TEAMS[code];
      if (!t) return '';
      var elim = t.status === 'eliminated';
      var champ = t.status === 'champion';
      var statusLabel = champ ? 'CHAMPION' : (elim ? 'OUT' : 'Active');
      var statusClass = champ ? 'champ' : (elim ? 'elim' : 'adv');
      return '<div class="sweep-team-row '+(elim?'eliminated':'active')+'" style="border-left-color:'+f.colour+'">'
        + '<div class="sweep-team-flag">'+t.flag+'</div>'
        + '<div class="sweep-team-name">'+t.name+'</div>'
        + '<div class="sweep-team-status '+statusClass+'">'+statusLabel+'</div>'
        + '</div>';
    }).join('');

    return '<div class="sweep-card">'
      + '<div class="sweep-card-header" style="border-left:4px solid '+f.colour+';background:linear-gradient(90deg,'+f.colour+'22 0%,transparent 100%)">'
      + '<div class="sweep-colour" style="background:'+f.colour+'"></div>'

function renderAll() {

  teamOwner = {};
  FRIENDS.forEach(function(f) {
    f.teams.forEach(function(t) { teamOwner[t] = f; });
  });
  buildDashboard();
  buildGroups();
  buildKnockout();

var refreshInterval = null;

function checkRateLimit(res) {
  var remaining = res.headers.get('X-Requests-Available-Minute');
  var reset = res.headers.get('X-RequestCounter-Reset');
  if (remaining !== null && parseInt(remaining) < 3) {
    var wait = reset ? parseInt(reset) * 1000 : 60000;
    console.warn('Rate limit low — pausing refresh for', wait, 'ms');
    if (refreshInterval) { clearInterval(refreshInterval); refreshInterval = null; }
    setTimeout(function() {
      refreshInterval = setInterval(function() {
        fetchFromApi().catch(function(e) { console.error('Refresh failed:', e); });
      }, 60000);
    }, wait);
  }
}

async function fetchLiveMinutes(matches, headers) {
  var liveMatches = matches.filter(function(m) {
    return m.status === 'IN_PLAY' || m.status === 'PAUSED' || m.status === 'HALFTIME';
  });
  await Promise.all(liveMatches.map(async function(m) {
    try {
      var res = await fetch(
        'https://curly-thunder-54e8.tumoanapoata.workers.dev/v4/matches/' + m.id,
        { headers: headers }
      );
      var data = await res.json();
      m.minute = data.minute || m.minute;
      m.injuryTime = data.injuryTime || null;
    } catch(e) { /* silently fail, keep existing minute */ }
  }));
}

async function fetchFromApi() {
  var headers = { 'X-Auth-Token': API_KEY };
  var matchesRes = await fetch(API_BASE + 'matches', { headers: headers });
  checkRateLimit(matchesRes);
  var standingsRes = await fetch(API_BASE + 'standings', { headers: headers });
  checkRateLimit(standingsRes);
  if (!matchesRes.ok || !standingsRes.ok) throw new Error('API error ' + matchesRes.status);
  var matchesData = await matchesRes.json();
  var standingsData = await standingsRes.json();

  var allMatches = matchesData.matches || [];
  await fetchLiveMinutes(allMatches, headers);

  // Split group stage vs knockout
  var groupMatches = allMatches.filter(function(m) { return m.stage && m.stage.startsWith('GROUP'); });
  var knockoutMatches = allMatches.filter(function(m) { return m.stage && !m.stage.startsWith('GROUP'); });

  MATCHES = mapApiMatches(groupMatches.concat(knockoutMatches));

  if (standingsData.standings && standingsData.standings.length) {
    GROUPS = mapApiStandings(standingsData.standings);
  }

  if (knockoutMatches.length) {
    KNOCKOUT = mapApiKnockout(knockoutMatches);
  }

  // Update TEAMS statuses using full third-place qualification logic
  // Confirmed 8 best third-placed teams that qualified for Round of 32
  var THIRD_PLACE_QUALIFIED = {
    'COD': true,  // DR Congo  - 4pts +1 GD
    'SWE': true,  // Sweden    - 4pts  0 GD
    'ECU': true,  // Ecuador   - 4pts  0 GD
    'GHA': true,  // Ghana     - 4pts  0 GD
    'BIH': true,  // Bosnia    - 4pts -1 GD
    'ALG': true,  // Algeria   - 4pts -2 GD
    'PAR': true,  // Paraguay  - 4pts -2 GD
    'SEN': true,  // Senegal   - 3pts +2 GD
  };

  var allGroupsComplete = Object.keys(GROUPS).every(function(gk) {
    return GROUPS[gk].teams.every(function(t) { return t.mp === 3; });
  });

  Object.keys(GROUPS).forEach(function(gk) {
    var g = GROUPS[gk];
    var allPlayed = g.teams.every(function(t) { return t.mp === 3; });
    if (allPlayed) {
      g.teams.forEach(function(t, i) {
        if (!TEAMS[t.code]) return;
        if (i < 2) {
          // Top 2 always qualify
          TEAMS[t.code].status = 'active';
        } else if (i === 2) {
          // 3rd place - qualified only if in confirmed top 8
          TEAMS[t.code].status = allGroupsComplete
            ? (THIRD_PLACE_QUALIFIED[t.code] ? 'active' : 'eliminated')
            : 'active'; // keep active until all groups done
        } else {
          // 4th place - always eliminated once group is done
          TEAMS[t.code].status = 'eliminated';
        }
      });
    }
  });

  // Mark knockout losers as eliminated
  knockoutMatches.forEach(function(m) {
    if (m.status !== 'FINISHED') return;
    var winner = m.score && m.score.winner;
    if (!winner || winner === 'DRAW') return;
    var homeCode = toLocalCode(m.homeTeam && m.homeTeam.tla ? m.homeTeam.tla : '');
    var awayCode = toLocalCode(m.awayTeam && m.awayTeam.tla ? m.awayTeam.tla : '');
    var loser = winner === 'HOME_TEAM' ? awayCode : homeCode;
    if (loser && TEAMS[loser]) {
      TEAMS[loser].status = 'eliminated';
    }
  });

  renderAll();
  hideBanner();
  showBanner('✓ Live data loaded · auto-refreshes every 60s', 'rgba(46,204,113,0.15)');
  setTimeout(hideBanner, 3000);
}

function init() {
  // Always render with static data first so page isn't blank
  renderAll();

  if (!USE_API || API_KEY === 'YOUR_API_KEY_HERE') {
    showBanner('📋 Showing static data — add your football-data.org API key to enable live updates', 'rgba(200,168,75,0.12)');
    return;
  }

  showBanner('⏳ Loading live data…', 'rgba(200,168,75,0.12)');
  fetchFromApi().catch(function(err) {
    console.error('API fetch failed:', err);
    showBanner('⚠️ Could not load live data — showing last known scores', 'rgba(230,57,70,0.15)');
  });

  // Auto-refresh every 60 seconds
  refreshInterval = setInterval(function() {
    fetchFromApi().catch(function(err) { console.error('Refresh failed:', err); });
  }, 60000);
}

init();
</script>
</body>
</html>
